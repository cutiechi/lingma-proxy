name: Version Sync

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Check Version Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify synced version files
        run: ./scripts/check-version-sync.sh

      - name: Verify release notes entry
        run: ./scripts/check-release-notes.sh
