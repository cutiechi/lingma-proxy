name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.3.2"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Verify synced version files
        run: ./scripts/check-version-sync.sh

      - name: Verify release notes entry
        run: ./scripts/check-release-notes.sh

      - name: Build desktop frontend
        run: |
          npm ci --prefix desktop/frontend
          npm run build --prefix desktop/frontend

      - name: Run tests
        run: go test ./...

  build-cli-macos:
    name: Build CLI macOS
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist/lingma-proxy ./cmd/lingma-ipc-proxy
          tar -C dist -czf "lingma-proxy_${RELEASE_TAG}_darwin_arm64.tar.gz" lingma-proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos
          path: lingma-proxy_${{ env.RELEASE_TAG }}_darwin_arm64.tar.gz

  build-cli-windows:
    name: Build CLI Windows
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI
        shell: pwsh
        run: |
          .\scripts\build.ps1 -Clean
          $asset = "lingma-proxy_${env:RELEASE_TAG}_windows_amd64.zip"
          Compress-Archive -Path .\dist\lingma-proxy.exe -DestinationPath $asset -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows
          path: lingma-proxy_${{ env.RELEASE_TAG }}_windows_amd64.zip

  build-cli-linux:
    name: Build CLI Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build CLI amd64
        run: |
          mkdir -p dist-amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o dist-amd64/lingma-proxy ./cmd/lingma-ipc-proxy
          tar -C dist-amd64 -czf "lingma-proxy_${RELEASE_TAG}_linux_amd64.tar.gz" lingma-proxy

      - name: Build CLI arm64
        run: |
          mkdir -p dist-arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o dist-arm64/lingma-proxy ./cmd/lingma-ipc-proxy
          tar -C dist-arm64 -czf "lingma-proxy_${RELEASE_TAG}_linux_arm64.tar.gz" lingma-proxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux
          path: lingma-proxy_${{ env.RELEASE_TAG }}_linux_*.tar.gz

  build-desktop-macos:
    name: Build Desktop macOS
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: npm ci --prefix desktop/frontend

      - name: Build app
        run: |
          cd desktop
          wails build -platform darwin/arm64 -clean

      - name: Package app
        run: |
          APP_PATH="$(find desktop/build/bin -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          test "$(basename "$APP_PATH")" = "Lingma Proxy.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "lingma-proxy-desktop_${RELEASE_TAG}_darwin_arm64.zip"
          DMG_ROOT="$(mktemp -d)"
          cp -R "$APP_PATH" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"
          hdiutil create \
            -volname "Lingma Proxy" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "lingma-proxy-desktop_${RELEASE_TAG}_darwin_arm64.dmg"
          rm -rf "$DMG_ROOT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            lingma-proxy-desktop_${{ env.RELEASE_TAG }}_darwin_arm64.zip
            lingma-proxy-desktop_${{ env.RELEASE_TAG }}_darwin_arm64.dmg

  build-desktop-windows:
    name: Build Desktop Windows
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/frontend/package-lock.json

      - name: Install Wails
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install frontend dependencies
        run: npm ci --prefix desktop/frontend

      - name: Build app
        shell: pwsh
        run: |
          Push-Location desktop
          wails build -platform windows/amd64 -clean
          Pop-Location

      - name: Package app
        shell: pwsh
        run: |
          $exe = Get-ChildItem .\desktop\build\bin -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "Desktop exe was not produced" }
          if ($exe.Name -ne "LingmaProxy.exe") { throw "Unexpected desktop exe name: $($exe.Name)" }
          $asset = "lingma-proxy-desktop_${env:RELEASE_TAG}_windows_amd64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $asset -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: lingma-proxy-desktop_${{ env.RELEASE_TAG }}_windows_amd64.zip

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-cli-macos
      - build-cli-windows
      - build-desktop-macos
      - build-desktop-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > "lingma-proxy_${RELEASE_TAG}_sha256.txt"

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: artifacts/*
